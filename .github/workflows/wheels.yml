name: Build pypglite Wheels

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            cibw_platform: linux
            cibw_archs: x86_64
          - name: macos-x86_64
            os: macos-15-intel
            cibw_platform: macos
            cibw_archs: x86_64
          - name: macos-arm64
            os: macos-15
            cibw_platform: macos
            cibw_archs: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install make

      - name: Build wheels
        env:
          CIBW_PLATFORM: ${{ matrix.cibw_platform }}
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          PGLITE_BUILD_JOBS: ${{ runner.os == 'macOS' && '2' || '8' }}
          WHEELHOUSE_DIR: wheelhouse
        run: bash scripts/build-pypglite-wheels.sh

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pypglite-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

      - name: Publish wheels to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
