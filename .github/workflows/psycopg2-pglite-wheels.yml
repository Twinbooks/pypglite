name: Build psycopg2-pglite Wheels

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
          - name: macos-x86_64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-15
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install make

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex perl patch

      - name: Build psycopg2-pglite wheel
        env:
          PGLITE_BUILD_JOBS: ${{ runner.os == 'macOS' && '2' || '8' }}
          PYTHON_BIN: ${{ env.pythonLocation }}/bin/python
        run: bash scripts/build-psycopg2-pglite-wheel.sh

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: psycopg2-pglite-wheels-${{ matrix.name }}-py${{ matrix.python-version }}
          path: postgres-pglite/pglite/out/upstream-psycopg2/wheelhouse/*.whl

      - name: Publish wheels to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: postgres-pglite/pglite/out/upstream-psycopg2/wheelhouse/*.whl
